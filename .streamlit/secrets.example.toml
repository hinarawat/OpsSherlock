# Copy this file to .streamlit/secrets.toml and fill in your own values.
#   cp .streamlit/secrets.example.toml .streamlit/secrets.toml

# REQUIRED — the only key you truly need to run the app:
OPENROUTER_API_KEY = ""            # openrouter.ai -> Keys
MODEL = "anthropic/claude-haiku-4.5"

# OPTIONAL — web-search fallback when no runbook matches:
TAVILY_API_KEY = ""                # free at app.tavily.com

# OPTIONAL — Jira ticket creation + live ticket card:
JIRA_BASE_URL = ""                 # https://yoursite.atlassian.net
JIRA_EMAIL = ""
JIRA_API_TOKEN = ""                # id.atlassian.com -> Security -> API tokens
JIRA_PROJECT_KEY = ""              # e.g. OPS

# OPTIONAL — Slack + email fan-out via n8n:
N8N_WEBHOOK_URL = ""
SLACK_INVITE_URL = ""
